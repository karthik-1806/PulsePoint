[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = ["E501", "B008", "C901", "E402", "B904", "B905", "F821"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
