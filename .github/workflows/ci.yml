name: PulsePoint CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Backend Linting (Ruff & Black)
      working-directory: ./backend
      run: |
        black --check .
        ruff check .
        
    - name: Run Backend Tests and Coverage
      working-directory: ./backend
      run: |
        pytest --cov=. --cov-report=xml
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps
        
    - name: Run Frontend Linting (ESLint)
      working-directory: ./frontend
      run: npm run lint
        
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium
      
    - name: Start Servers and Run Playwright Tests
      working-directory: ./frontend
      env:
        GEMINI_API_KEY: mock_key_for_testing
        JWT_SECRET: mock_jwt_secret
      run: |
        # Start backend in background
        cd ../backend
        uvicorn main:app --port 8000 &
        BACKEND_PID=$!
        
        # Start frontend server and run playwright tests
        cd ../frontend
        npx playwright test
        
        # Cleanup
        kill $BACKEND_PID
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7
